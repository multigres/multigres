name: Upload test results to Trunk
description: >-
  Uploads test results to Trunk Flaky Tests and optionally quarantines
  known-flaky failures. Authenticates with the non-secret public repo
  identifier (public-repo-id) instead of an org token, so it works on a fork
  where repository secrets are unavailable. Converts `go test -json` output to
  JUnit XML when an existing JUnit file is not supplied.

inputs:
  junit-paths:
    description: >-
      Comma-separated list of glob paths to existing JUnit XML files (forwarded
      to the Trunk uploader's junit-paths). Takes precedence over json-file when
      both are set.
    required: false
    default: ""
  json-file:
    description: >-
      Path to a single `go test -json` JSONL file (as produced by gotestsum
      --jsonfile or `go test -json | tee`). Converted to JUnit XML when
      junit-paths is not set.
    required: false
    default: ""
  previous-step-outcome:
    description: >-
      Outcome of the test step, i.e. ${{ steps.<id>.outcome }}. In quarantine
      mode this is how the uploader learns whether tests failed. An empty value
      (e.g. a stale step id) is treated as 'failure' so the gate fails closed
      rather than silently passing.
    required: true
  allow-quarantine:
    description: >-
      Whether to allow Trunk to quarantine failing tests. When 'true', the
      uploader step exits non-zero only if there are non-quarantined failures,
      so it can gate the job in place of the (continue-on-error) test step. The
      quarantine decision itself is Trunk's; this only permits it.
    required: false
    default: "false"
  org-slug:
    description: Trunk organization slug. Non-secret; safe to commit.
    required: false
    default: supabase
  public-repo-id:
    description: >-
      Trunk per-repo identifier, used instead of an org token so the upload
      works on a fork without repository secrets. Non-secret; safe to commit.
    required: false
    default: R2BxLxNS

runs:
  using: composite
  steps:
    - name: Prepare JUnit results for Trunk
      id: prepare
      shell: bash
      env:
        JUNIT_PATHS: ${{ inputs.junit-paths }}
        JSON_FILE: ${{ inputs.json-file }}
        PREV_OUTCOME: ${{ inputs.previous-step-outcome }}
      run: |
        set -euo pipefail
        # Fail closed: an empty outcome (e.g. a stale step id that resolves to "")
        # must not silently disable quarantine gating. Treat it as a failure so
        # the uploader still gates on it.
        echo "previous-step-outcome=${PREV_OUTCOME:-failure}" >> "$GITHUB_OUTPUT"
        if [[ -n "$JUNIT_PATHS" ]]; then
          # Forward the user's glob/list straight through to the uploader.
          out="$JUNIT_PATHS"
        elif [[ -z "$JSON_FILE" ]]; then
          echo "::error::upload-test-results requires either junit-paths or json-file"
          exit 1
        elif [[ -f "$JSON_FILE" ]]; then
          # go-junit-report converts the `go test -json` event stream into JUnit
          # XML, the format the Trunk uploader consumes. The module is
          # checksum-verified against the Go checksum database on download.
          go install github.com/jstemmer/go-junit-report/v2@v2.1.0
          out="${JSON_FILE%.*}.trunk-junit.xml"
          "$(go env GOPATH)/bin/go-junit-report" -parser gojson -in "$JSON_FILE" -out "$out"
        else
          # Suite crashed before writing output; allow-missing-junit-files (the
          # uploader's default) keeps the missing path from being a hard error.
          echo "::warning::json-file '$JSON_FILE' not found; nothing to convert"
          out="${JSON_FILE%.*}.trunk-junit.xml"
        fi
        echo "junit-paths=$out" >> "$GITHUB_OUTPUT"

    - name: Upload to Trunk
      uses: trunk-io/analytics-uploader@58d9d52d4a8ed29fefca0afb568293f2047826b3 # v2.1.0
      with:
        junit-paths: ${{ steps.prepare.outputs.junit-paths }}
        org-slug: ${{ inputs.org-slug }}
        public-repo-id: ${{ inputs.public-repo-id }}
        quarantine: ${{ inputs.allow-quarantine }}
        previous-step-outcome: ${{ steps.prepare.outputs.previous-step-outcome }}
