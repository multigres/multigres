name: Multigres Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-integration:
    name: Run full integration test suite
    runs-on: ubuntu-24.04
    environment:
      name: ci
      deployment: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh

      - name: Build
        run: make build

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Start port pool server
        run: |
          ./bin/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      - name: Run integration tests
        env:
          TEST_PRINT_LOGS: "1"
          AWS_ACCESS_KEY_ID: test-access-key
          AWS_SECRET_ACCESS_KEY: test-secret-key
        run: |
          gotestsum \
            --format=testname \
            --rerun-fails=3 \
            --rerun-fails-max-failures=10 \
            --packages="./go/test/endtoend/..." \
            --jsonfile=integration-test-results.jsonl \
            --junitfile=integration-test-results.xml \
            -- \
            -skip TestPostgreSQLRegression -timeout=30m

      - name: Stop port pool server
        run: kill "$PORT_POOL_PID" || true

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: integration-test-logs
          path: |
            integration-test-results.jsonl
            integration-test-results.xml
          retention-days: 14

      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Integration Tests
          path: integration-test-results.jsonl
          reporter: golang-json

      # Only upload test results from main-branch pushes. On PRs, Codecov's
      # test-results comment template replaces the coverage comment when any
      # test fails, displacing the coverage diff that PR authors actually want
      # to see. Flake tracking only needs main-branch history anyway.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && github.event_name == 'push' }}
        continue-on-error: true
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./integration-test-results.xml
          report_type: test_results
          flags: integration
          fail_ci_if_error: false
