name: Flaky Ticket Sync

on:
  schedule:
    # Daily at 13:00 UTC.
    - cron: "0 13 * * *"
  # checkov:skip=CKV_GHA_7: the input is a read-only flag that switches the
  # sync tool to dry-run mode; it does not influence any build artifact, so
  # the "build output cannot be affected by user parameters" rule does not
  # apply.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log ticket mutations instead of performing them"
        required: false
        default: "false"

permissions: {}

jobs:
  sync:
    name: Dedupe, enrich, and close flaky-test tickets
    runs-on: ubuntu-24.04
    environment:
      name: ci
      deployment: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # The Linear team/label/project and Trunk org slug are deliberately
      # kept out of this public repository: they come from ci-environment
      # secrets, which GitHub also masks in the public run logs.
      - name: Run ticket sync
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
          TRUNK_ORG_SLUG: ${{ secrets.TRUNK_ORG_SLUG }}
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          LINEAR_TEAM_KEY: ${{ secrets.LINEAR_TEAM_KEY }}
          LINEAR_LABEL: ${{ secrets.LINEAR_LABEL }}
          LINEAR_PROJECT: ${{ secrets.LINEAR_PROJECT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          args=()
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          go run ./go/tools/flakyticketsync "${args[@]}"
