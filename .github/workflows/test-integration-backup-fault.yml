name: Multigres Backup Fault-Tolerance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-backup-fault:
    name: backup-fault-${{ matrix.shard.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: A
            tests: "TestBackup_FailureMatrix_PrimaryFailover|TestBackup_TimelineSwitchAndChainContinuity"
          - name: B
            tests: "TestBackup_FailureMatrix_PlannedSwitchover|TestBackup_StalePrimaryArchiveFencing"
          - name: C
            tests: "TestBackup_ReplicaDownDuringBackup|TestBackup_ConcurrentMatrix"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh

      # System V shared memory segments leak when previous postgres processes
      # are not shut down cleanly (e.g., a prior shard run left tmpfiles).
      # Clear them up front so this shard's PostgreSQL instances can allocate
      # their own. macOS-style note in CLAUDE.md applies on Linux runners
      # too, just less commonly.
      - name: Clear leaked SysV shmem segments
        run: |
          ipcs -m | awk -v u="$USER" '$5==u {print $2}' | xargs -r -n1 ipcrm -m || true

      - name: Build
        run: make build

      - name: Start port pool server
        run: |
          ./bin/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      - name: Run backup fault tests (shard ${{ matrix.shard.name }})
        env:
          TEST_PRINT_LOGS: "1"
          AWS_ACCESS_KEY_ID: test-access-key
          AWS_SECRET_ACCESS_KEY: test-secret-key
        run: |
          go test -json -v -timeout 15m -parallel 4 \
            -run '^(${{ matrix.shard.tests }})$' \
            ./go/test/endtoend/multipooler/... \
            | tee backup-fault-results-${{ matrix.shard.name }}.jsonl \
            | go tool tparse -follow

      - name: Stop port pool server
        run: kill "$PORT_POOL_PID" || true

      - name: Upload test logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: backup-fault-results-${{ matrix.shard.name }}
          path: backup-fault-results-${{ matrix.shard.name }}.jsonl
          retention-days: 7

      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Backup Fault Tests (shard ${{ matrix.shard.name }})
          path: backup-fault-results-${{ matrix.shard.name }}.jsonl
          reporter: golang-json
