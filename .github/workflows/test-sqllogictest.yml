name: SQLLogicTest Differential Suite

on: # yamllint disable-line rule:truthy
  schedule:
    # Weekly Mon 10:00 UTC — staggered off pgproto's daily 09:30 slot.
    - cron: "0 10 * * 1"
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions: {}

jobs:
  test-sqllogictest:
    name: Run sqllogictest differential suite
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'Run all Query Serving Tests')
    runs-on: ubuntu-24.04
    environment:
      name: ci
      deployment: false
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up test environment
        run: .github/scripts/setup-test-environment.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libreadline-dev zlib1g-dev

      - name: Install tools (downloads sqllogictest-bin via pinned SHA)
        run: make tools

      - name: Build
        run: make build

      - name: Start port pool server
        run: |
          ./bin/portpoolserver --socket /tmp/multigres-port-pool.sock &
          echo "PORT_POOL_PID=$!" >> "$GITHUB_ENV"
          echo "MULTIGRES_PORT_POOL_ADDR=/tmp/multigres-port-pool.sock" >> "$GITHUB_ENV"

      - name: Run SQLLogicTest suite
        id: sqllogictest
        env:
          RUN_EXTENDED_QUERY_SERVING_TESTS: "1"
          TEST_PRINT_LOGS: "1"
        run: |
          go test -json -v -run TestPostgreSQLSqlLogicTest \
            ./go/test/endtoend/queryserving/sqllogictest/... \
            -timeout 170m | tee sqllogictest-results.jsonl | go tool tparse -follow

      - name: Stop port pool server
        if: always()
        run: kill "$PORT_POOL_PID" || true

      # Upload-only: this differential suite has its own divergence detection,
      # so continue-on-error keeps a Trunk-side exit from changing the job result.
      - name: Upload test results to Trunk
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/upload-test-results
        with:
          json-file: sqllogictest-results.jsonl
          previous-step-outcome: ${{ steps.sqllogictest.outcome }}

      - name: Find results.json
        id: results
        if: ${{ !cancelled() }}
        run: |
          results_file=$(find /tmp/multigres_pg_cache/results -name results.json -type f 2>/dev/null | head -1)
          if [[ -n "$results_file" ]]; then
            echo "path=$results_file" >> "$GITHUB_OUTPUT"
            echo "Found results at: $results_file"
          else
            echo "No results.json found"
          fi

      - name: Detect divergences
        id: divergences
        if: ${{ !cancelled() && steps.results.outputs.path != '' }}
        env:
          RESULTS_PATH: ${{ steps.results.outputs.path }}
        run: |
          # A divergence is any file that passes on postgres but fails on
          # multigateway. We treat every such file as something to flag —
          # there is no baseline comparison anymore.
          jq -r '
            [ .[] as $s
              | $s.tests[]
              | select(.postgres.passed == true and .multigateway.passed == false)
              | {suite: $s.name, test: .name}
            ]
          ' "$RESULTS_PATH" > /tmp/sqllogictest-divergences.json

          count=$(jq 'length' /tmp/sqllogictest-divergences.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" -gt 0 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload sqllogictest results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: sqllogictest-results
          path: /tmp/multigres_pg_cache/results/**/*
          if-no-files-found: warn

      - name: Notify Slack on divergence
        if: >-
          !cancelled() &&
          steps.divergences.outputs.found == 'true' &&
          github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGREGRESS_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          divergences=$(cat /tmp/sqllogictest-divergences.json)
          count=$(echo "$divergences" | jq 'length')
          test_list=$(echo "$divergences" | jq -r '.[] | "- [\(.suite)] \(.test)"' | head -20)
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(jq -n \
            --arg count "$count" \
            --arg tests "$test_list" \
            --arg url "$run_url" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: (":rotating_light: " + $count + " sqllogictest divergence(s) detected")}},
                {type: "section", text: {type: "mrkdwn", text: ("Files that pass on postgres but fail on multigateway:\n```\n" + $tests + "\n```")}},
                {type: "section", text: {type: "mrkdwn", text: ("<" + $url + "|View CI run>")}}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack weekly summary
        if: >-
          !cancelled() &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          steps.results.outputs.path != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGREGRESS_WEBHOOK_URL }}
          RESULTS_PATH: ${{ steps.results.outputs.path }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          results_file="$RESULTS_PATH"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # results.json is an array of suites (one per protocol). Report
          # per-suite counts so simple and extended tracking stay distinct.
          payload=$(jq -n \
            --slurpfile results "$results_file" \
            --arg url "$run_url" \
            '
            ($results[0] | map({
              name: .name,
              total: .total_files,
              pg: .postgres_passed,
              mg: .multigateway_passed,
              mg_rate: (if .total_files > 0 then (.multigateway_passed * 100 / .total_files | floor) else 0 end),
              divergences: .passed_pg_only
            })) as $suites |

            [{type: "header", text: {type: "plain_text",
              text: "Weekly sqllogictest report"}}] +

            ($suites | map(
              {type: "section", text: {type: "mrkdwn",
                text: ("*" + .name + "*: " + (.mg | tostring) + "/" + (.total | tostring) +
                       " multigateway passed (" + (.mg_rate | tostring) + "%)\n" +
                       "postgres: " + (.pg | tostring) + "/" + (.total | tostring) +
                       " • proxy divergences: " + (.divergences | tostring))}}
            )) +

            [{type: "section", text: {type: "mrkdwn", text: ("<" + $url + "|View CI run>")}}] |

            {blocks: .}
            ')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on test infrastructure failure
        if: >-
          !cancelled() &&
          steps.results.outputs.path == '' &&
          github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PGREGRESS_WEBHOOK_URL }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then echo "No webhook configured, skipping"; exit 0; fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(jq -n \
            --arg url "$run_url" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: "sqllogictest suite failed to produce results"}},
                {type: "section", text: {type: "mrkdwn", text: "The weekly sqllogictest run did not produce a `results.json`. The test infrastructure likely failed (e.g. cluster bootstrap timeout, build failure)."}},
                {type: "section", text: {type: "mrkdwn", text: ("<" + $url + "|View CI run>")}}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      # Note: the Go test writes the pass/fail summary (including shields.io
      # badge) directly to GITHUB_STEP_SUMMARY via report.go.
      # Full per-file output is in the uploaded artifact.
