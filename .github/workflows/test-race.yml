name: Race Detection Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test-race:
    name: Race Detection Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run race detection tests
        id: race-tests
        # continue-on-error lets the Trunk upload step below gate the job
        # instead: it passes when every failure is quarantined, fails otherwise.
        continue-on-error: true
        run: |
          gotestsum \
            --format=testname \
            --rerun-fails=3 \
            --rerun-fails-max-failures=10 \
            --packages="./..." \
            --jsonfile=race-test-results.jsonl \
            --junitfile=race-test-results.xml \
            -- \
            -short -race -timeout=20m

      - name: Upload test results to Trunk
        if: ${{ !cancelled() }}
        uses: ./.github/actions/upload-test-results
        with:
          junit-paths: race-test-results.xml
          previous-step-outcome: ${{ steps.race-tests.outcome }}
          allow-quarantine: "true"

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: race-test-logs
          path: |
            race-test-results.jsonl
            race-test-results.xml
          retention-days: 14

      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Race Detection Tests
          path: race-test-results.jsonl
          reporter: golang-json
