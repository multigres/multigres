# Locale overrides appended at initdb time for the pg_regress harness.
#
# The default pgctld template hard-codes en_US.UTF-8 for the locale-sensitive
# GUCs. Upstream pg_regress runs initdb with --no-locale (C locale across all
# categories), so its expected fixtures assume:
#   - to_char(..., 'L') emits an empty currency symbol (lc_monetary = 'C')
#   - error messages are English untranslated (lc_messages = 'C')
#   - number/time formatting uses C conventions
#
# Without these overrides, currency tests (int8.out, numeric.out) and any test
# that exercises locale-dependent output diverge from the upstream expected
# files. Append-after-template (postgres applies last-write-wins) keeps prod
# defaults intact and only flips locales for the pgregresstest harness.
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
