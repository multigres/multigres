// This file contains data structures for query results in Multigres.

syntax = "proto3";

package query;

import "clustermetadata.proto";

option go_package = "github.com/multigres/multigres/go/pb/query";

// QueryResultPayload is a union type for streaming query results.
// Each stream item is either row data OR a diagnostic (error/notice).
// This enables zero-buffering notice delivery during query execution.
message QueryResultPayload {
  oneof payload {
    QueryResult result = 1;      // Row data with fields/rows/command_tag
    PgDiagnostic diagnostic = 2; // Individual error or notice
    PgNotification notification = 3; // Async notification from LISTEN
  }
}

// QueryResult represents the result of executing a query
message QueryResult {
  // fields describes the columns in the result set (nil if no rows returned)
  repeated Field fields = 1;

  // rows_affected is the number of rows affected (INSERT, UPDATE, DELETE, etc.)
  uint64 rows_affected = 2;

  // rows contains the actual data rows
  repeated Row rows = 3;

  // command_tag is the PostgreSQL command tag for this result set.
  // When streaming results, this should only be set on the final packet of a result set.
  // When set, the protocol layer will send CommandComplete and reset state for the next result set.
  // Examples: "SELECT 42", "INSERT 0 5", "UPDATE 10", "DELETE 3", "CREATE TABLE"
  string command_tag = 4;

  // has_fields distinguishes "no result set" (false, fields is nil) from
  // "zero-column result set" (true, fields is empty). Protobuf cannot
  // distinguish a nil repeated field from an empty one, so this bool
  // preserves the distinction across the gRPC boundary.
  bool has_fields = 5;
}

// Field represents metadata about a column in the result set.
// This includes all PostgreSQL wire protocol metadata needed for RowDescription messages.
message Field {
  // name is the column name
  string name = 1;

  // type is a human-readable type name (for logging/debugging)
  string type = 2;

  // table_oid is the object ID of the table (0 if not a table column)
  uint32 table_oid = 3;

  // table_attribute_number is the column number in the table (0 if not a table column)
  int32 table_attribute_number = 4;

  // data_type_oid is the object ID of the data type
  uint32 data_type_oid = 5;

  // data_type_size is the size of the data type (-1 for variable length)
  int32 data_type_size = 6;

  // type_modifier is the type modifier (-1 for no modifier)
  int32 type_modifier = 7;

  // format is the format code (0=text, 1=binary)
  int32 format = 8;
}

// Row represents a single row of data in the result set.
message Row {
  // lengths contains the length of each column value.
  // -1 means NULL, 0 means empty string, >0 means actual length.
  repeated sint64 lengths = 1;

  // values contains all non-null values concatenated together.
  // Use lengths to split this into individual column values.
  bytes values = 2;
}

// PgDiagnostic represents a PostgreSQL diagnostic message (error or notice).
// PostgreSQL uses the same wire format for both ErrorResponse ('E') and NoticeResponse ('N'),
// differentiated by the message_type field. This unified structure captures all 14 fields
// defined in the PostgreSQL protocol for diagnostic messages.
//
// Error severities: ERROR, FATAL, PANIC
// Notice severities: WARNING, NOTICE, DEBUG, INFO, LOG
//
// Reference: https://www.postgresql.org/docs/current/protocol-error-fields.html
message PgDiagnostic {
  // message_type is the PostgreSQL protocol message type byte.
  // 'E' (0x45 = 69) for ErrorResponse, 'N' (0x4E = 78) for NoticeResponse.
  // This determines whether the diagnostic is an error or notice.
  int32 message_type = 15;

  // severity is the severity level (e.g., "ERROR", "FATAL", "WARNING", "NOTICE", "INFO")
  string severity = 1;

  // code is the SQLSTATE error code (e.g., "42P01", "22P02")
  string code = 2;

  // message is the primary human-readable diagnostic message
  string message = 3;

  // detail provides additional detail about the diagnostic (optional)
  string detail = 4;

  // hint provides a hint about how to address the issue (optional)
  string hint = 5;

  // position is the cursor position in the original query string (1-indexed, 0 if not available)
  int32 position = 6;

  // internal_position is the cursor position in the internal query (1-indexed, 0 if not available)
  int32 internal_position = 7;

  // internal_query is the text of the internally-generated query (optional)
  string internal_query = 8;

  // where is the context in which the diagnostic occurred, e.g., PL/pgSQL call stack (optional)
  string where = 9;

  // schema_name is the name of the schema associated with the diagnostic (optional)
  string schema_name = 10;

  // table_name is the name of the table associated with the diagnostic (optional)
  string table_name = 11;

  // column_name is the name of the column associated with the diagnostic (optional)
  string column_name = 12;

  // data_type_name is the name of the data type associated with the diagnostic (optional)
  string data_type_name = 13;

  // constraint_name is the name of the constraint associated with the diagnostic (optional)
  string constraint_name = 14;
}

// PgNotification represents a PostgreSQL asynchronous notification.
// Sent via NotificationResponse ('A') messages to clients that have issued LISTEN.
message PgNotification {
  // pid is the process ID of the notifying backend.
  int32 pid = 1;

  // channel is the notification channel name.
  string channel = 2;

  // payload is the notification payload string (may be empty).
  string payload = 3;
}

// StatementDescription describes a prepared statement or portal.
// Used for the Describe message ('D') response in the extended query protocol.
message StatementDescription {
  // parameters describes the parameters of the statement (for statement describe)
  // Nil for portal describe.
  repeated ParameterDescription parameters = 1;

  // fields describes the result columns
  // Nil if the statement doesn't return rows.
  repeated Field fields = 2;
}

// ParameterDescription describes a parameter in a prepared statement.
message ParameterDescription {
  // data_type_oid is the OID of the parameter's data type
  uint32 data_type_oid = 1;
}

// Target identifies the target for query execution.
// It specifies which tablegroup, shard, and pooler type to route the query to.
// - Route to PRIMARY for writes
// - Route to REPLICA for reads
// - Route to specific shards (future)
message Target {
  // table_group is the target tablegroup name
  string table_group = 1;

  // shard is the target shard name (empty for unsharded or to route to any shard)
  string shard = 2;

  // pooler_type is the type of pooler to route to (PRIMARY, REPLICA)
  // If not specified (UNKNOWN), defaults to PRIMARY
  // TODO: Change from PoolerType something else, like a TargetType or ServingType enum.
  clustermetadata.PoolerType pooler_type = 3;
}

// PreparedStatement represents a prepared statement in the extended query protocol.
// Prepared statements are created by the Parse message and can be executed
// multiple times with different parameter values.
message PreparedStatement {
  // name is the client-provided name for the prepared statement.
  // An empty name indicates the unnamed statement.
  string name = 1;

  // query is the SQL query string.
  string query = 2;

  // param_types contains the OIDs of the parameter types.
  // This is sent by the client in the Parse message.
  repeated uint32 param_types = 3;
}

// ExecuteSqlPreparedStatement carries a SQL-level EXECUTE wrapper whose
// prepared-statement name must be resolved by the multipooler. The gateway
// renders the legal PostgreSQL wrapper around the name as prefix/suffix, and
// the multipooler materializes:
//
//   sql_prefix || quote_ident(pooler_canonical_name) || sql_suffix
//
// after using prepared_statement to ensure the backend has the consolidated
// pooler-level prepared statement (ppstmt*) for the selected connection.
message ExecuteSqlPreparedStatement {
  // prepared_statement describes the underlying prepared query. The multipooler
  // deduplicates by (query, param_types), ignoring the gateway-local name, and
  // returns a pooler-local canonical name such as ppstmt0.
  PreparedStatement prepared_statement = 1;

  // sql_prefix is the SQL text before the prepared statement name, generated by
  // the gateway from the parsed AST. Examples: "EXECUTE ",
  // "EXPLAIN EXECUTE ", "CREATE TABLE t AS EXECUTE ".
  string sql_prefix = 2;

  // sql_suffix is the SQL text after the prepared statement name, including any
  // EXECUTE argument expressions and wrapper tail such as WITH NO DATA.
  string sql_suffix = 3;
}

// Portal represents a bound prepared statement with parameters.
// Portals are created by the Bind message and can be executed via Execute.
message Portal {
  // name is the client-provided name for the portal.
  // An empty name indicates the unnamed portal.
  string name = 1;

  // prepared_statement_name is the name of the prepared statement this portal is bound to.
  string prepared_statement_name = 2;

  // param_lengths contains the length of each parameter value.
  // -1 means NULL, 0 means empty string, >0 means actual length.
  repeated sint64 param_lengths = 3;

  // param_values contains all non-null parameter values concatenated together.
  // Use param_lengths to split this into individual parameter values.
  bytes param_values = 4;

  // param_formats specifies the format code for each parameter.
  // 0 = text, 1 = binary.
  // If empty, all parameters are text format.
  // If a single element, that format applies to all parameters.
  repeated int32 param_formats = 5;

  // result_formats specifies the format code for each result column.
  // 0 = text, 1 = binary.
  // If empty, all results are text format.
  // If a single element, that format applies to all result columns.
  repeated int32 result_formats = 6;
}

// ReservedState contains information about a reserved connection.
// Embedded in response messages to convey the authoritative reservation state from multipooler.
message ReservedState {
  // reserved_connection_id is the ID of the reserved connection.
  // Zero when the connection has been released or was not reserved.
  uint64 reserved_connection_id = 1;

  // pooler_id identifies which multipooler instance owns the reserved connection
  clustermetadata.ID pooler_id = 2;

  // reservation_reasons is a bitmask of ReservationReason values indicating why the connection
  // is still reserved. Zero means the connection was released.
  uint32 reservation_reasons = 3;

  // backend_process_id is the real PostgreSQL backend process ID for this
  // reserved connection — the PID visible in pg_stat_activity / pg_locks.
  // Used to bridge the gap between multigateway's virtual PIDs and
  // PostgreSQL's real PIDs so lock-detection functions like
  // pg_isolation_test_session_is_blocked() can map vpid → real pid through
  // the proxy.
  uint32 backend_process_id = 4;
}

// ExecuteOptions contains execution options for query execution.
// This includes session state like prepared statements and portals that
// need to be available on the connection where the query is executed.
message ExecuteOptions {
  // session_settings contains session variables (SET commands) that should
  // be applied to the connection before executing the query.
  // Key is the variable name, value is the variable value.
  map<string, string> session_settings = 1;

  // user is the PostgreSQL user/role identity for query execution.
  // This determines which per-user connection pool to use.
  // Required for per-user pool routing in the multipooler.
  string user = 2;

  // max_rows is the maximum number of rows to return from Execute.
  // 0 means return all rows. Used by the Execute message in the extended query protocol.
  uint64 max_rows = 4;

  // reserved_connection_id is the ID of a reserved connection on the multipooler.
  // Used for connection pinning - this tells the multipooler which specific
  // connection to use for executing this query.
  uint64 reserved_connection_id = 5;

  reserved 6;

  // user_auth carries SCRAM-SHA-256 passthrough keys captured during the
  // client's authentication handshake at the multigateway. When the
  // multipooler has SCRAM passthrough enabled, it uses these keys to
  // authenticate to the backing PostgreSQL as the session's real user
  // instead of relying on trust on the local connection. Unset for
  // sessions that did not authenticate via SCRAM.
  UserAuth user_auth = 7;

  // client_connection_id is the multigateway's virtual PID for this client
  // connection. The multipooler stamps it onto the underlying PostgreSQL
  // backend's application_name as `multigres_vpid:<id>` so lock-detection
  // functions can map virtual PIDs (visible to clients) back to real
  // backend PIDs via pg_stat_activity.
  uint32 client_connection_id = 8;

  // execute_sql_prepared_statement, if set, describes a SQL-level EXECUTE
  // wrapper that references a gateway-managed prepared statement. The
  // multipooler first prepares the underlying query using pooler-level
  // consolidation (ppstmt*), then substitutes that canonical name between the
  // provided SQL prefix/suffix and executes the materialized SQL. Used for
  // top-level EXECUTE, EXPLAIN EXECUTE, and CREATE TABLE ... AS EXECUTE.
  //
  // This field is only consumed by StreamExecute. PortalStreamExecute has its
  // own top-level prepared_statement field.
  ExecuteSqlPreparedStatement execute_sql_prepared_statement = 9;
}

// UserAuth carries cryptographic material extracted from the client's SCRAM
// handshake at multigateway. The pair (client_key, server_key) is sufficient
// to authenticate as the user to any SCRAM-SHA-256 verifier of the same
// password, without ever holding the plaintext password.
message UserAuth {
  // client_key is the SCRAM ClientKey recovered from the client's proof
  // during authentication. 32 bytes for SCRAM-SHA-256.
  //
  // [debug_redact = true] is the canonical signal of intent. It is currently
  // advisory in google.golang.org/protobuf (see
  // https://github.com/golang/protobuf/issues/1655); when upstream lands the
  // runtime path, generated String()/prototext output will redact this field
  // automatically. query_redact_test.go locks the annotation in.
  bytes client_key = 1 [debug_redact = true];

  // server_key is the SCRAM ServerKey read from the user's verifier in
  // pg_authid. 32 bytes for SCRAM-SHA-256.
  bytes server_key = 2 [debug_redact = true];
}

// ReservationOptions specifies options when creating or extending a reserved connection.
// This is passed alongside ExecuteOptions on requests that may need to create or modify
// a connection reservation. It is extensible for future options (e.g., isolation level,
// read-only mode).
message ReservationOptions {
  // reasons is a bitmask of multipoolerservice.ReservationReason values indicating why
  // the connection is being reserved. Multiple reasons can be ORed together (e.g.,
  // TRANSACTION | TEMP_TABLE).
  //
  // When non-zero and reserved_connection_id is 0, StreamExecute creates a new reserved
  // connection. When non-zero and reserved_connection_id is set, the reasons are OR'd
  // into the existing reservation.
  uint32 reasons = 1;

  // begin_query is the original BEGIN statement text (e.g., "BEGIN ISOLATION LEVEL SERIALIZABLE"
  // or "START TRANSACTION READ ONLY"). When set and the transaction reason is present, the
  // multipooler uses this instead of a plain "BEGIN" to preserve isolation level and access mode.
  // If empty and transaction reason is set, defaults to "BEGIN".
  string begin_query = 2;

  // pin_portal_names lists named portals (cursors) that must be pinned to the
  // reserved connection for the lifetime of the named portal — used for
  // DECLARE ... WITH HOLD, where the cursor must survive COMMIT. The
  // multipooler calls ReserveForPortal(name) for each entry, which adds
  // ReasonPortal to the reservation bitmask and registers the name in the
  // per-connection portal set. Independent of `reasons` — the multipooler
  // sets ReasonPortal implicitly when this list is non-empty.
  repeated string pin_portal_names = 3;

  // release_portal_names lists named portals (cursors) to unpin from the
  // reserved connection — used for CLOSE <name> / CLOSE ALL on a WITH HOLD
  // cursor. The multipooler calls ReleasePortal(name) for each entry; if
  // the call drains the final ReasonPortal bit AND no other reasons remain,
  // the connection is released back to the pool and the returned
  // ReservedState has connection_id == 0.
  repeated string release_portal_names = 4;

  // recheck_advisory_locks asks the multipooler to re-probe pg_locks after
  // running this statement and drop ReasonSessionAdvisoryLock (releasing the
  // connection if no other reason remains) when the session no longer holds any
  // advisory lock. The gateway sets it only for statements that touch
  // session-level advisory locks (an acquire — to catch a failed
  // pg_try_advisory_lock — or a release), so the probe runs only when it can
  // matter rather than after every query on a pinned connection.
  bool recheck_advisory_locks = 5;

  // mark_session_state_untrusted asks the multipooler to mark the reserved
  // connection's cached session state as maybe-diverged after this statement
  // succeeds. Used for ROLLBACK TO SAVEPOINT, where PostgreSQL can revert GUCs
  // on the backend without the pooler knowing the exact reverted state.
  bool mark_session_state_untrusted = 6;
}
