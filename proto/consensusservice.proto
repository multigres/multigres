syntax = "proto3";

package consensus;

import "consensusdata.proto";
import "multipoolermanagerdata.proto";

option go_package = "github.com/multigres/multigres/go/pb/consensus";

// MultiPoolerConsensus provides consensus APIs for leader election and HA operations.
service MultiPoolerConsensus {
  // HA Operations

  // UpdateConsensusRule applies a cohort-membership change (add/remove). The
  // primary handler updates synchronous_standby_names and records the cohort
  // change in rule_history.
  rpc UpdateConsensusRule(multipoolermanagerdata.UpdateConsensusRuleRequest)
    returns (multipoolermanagerdata.UpdateConsensusRuleResponse);

  // RewindToSource performs pg_rewind to synchronize this server with a source.
  // This is used to repair diverged timelines after failover.
  rpc RewindToSource(multipoolermanagerdata.RewindToSourceRequest)
    returns (multipoolermanagerdata.RewindToSourceResponse);

  // Recruit → Propose → SetTermPrimary appointment protocol.

  // Recruit asks a pooler to revoke all terms below the one specified and
  // record the coordinator's exclusive claim on that term.
  rpc Recruit(consensusdata.RecruitRequest) returns (consensusdata.RecruitResponse);

  // Propose sends a complete shard-state proposal to a pooler. The designated
  // leader promotes its postgres; all other cohort members point replication at
  // the new primary.
  rpc Propose(consensusdata.ProposeRequest) returns (consensusdata.ProposeResponse);

  // SetTermPrimary tells a pooler which postgres primary to follow at a given
  // consensus term. Used both to endorse in-flight proposals and to catch
  // followers up to durable decisions.
  rpc SetTermPrimary(consensusdata.SetTermPrimaryRequest) returns (consensusdata.SetTermPrimaryResponse);
}
