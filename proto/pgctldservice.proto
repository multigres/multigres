syntax = "proto3";

package pgctldservice;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/multigres/multigres/go/pb/pgctldservice";

// PostgreSQL Control Service
service PgCtld {

  // Bootstrap and lifecycle Methods

  // StartAsStandby starts PostgreSQL in standby (recovery) mode.
  // Always writes standby.signal before starting, ensuring postgres never starts as primary.
  // If the data directory was not cleanly shut down, PostgreSQL performs crash recovery
  // automatically as part of startup (before accepting connections).
  rpc StartAsStandby(StartAsStandbyRequest) returns (StartAsStandbyResponse);

  // Stop PostgreSQL server
  rpc Stop(StopRequest) returns (StopResponse);

  // Restart PostgreSQL server
  rpc Restart(RestartRequest) returns (RestartResponse);

  // Reload PostgreSQL configuration
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);

  // Get PostgreSQL server status
  rpc Status(StatusRequest) returns (StatusResponse);

  // Get server version information
  rpc Version(VersionRequest) returns (VersionResponse);

  // Initialize data directory
  rpc InitDataDir(InitDataDirRequest) returns (InitDataDirResponse);

  // PgRewind rewinds a PostgreSQL data directory to an earlier point in the timeline
  // This is used to resynchronize a server that diverged from the primary after a failback
  rpc PgRewind(PgRewindRequest) returns (PgRewindResponse);
}

// StartAsStandby starts PostgreSQL in standby (recovery) mode.
message StartAsStandbyRequest {
  // Override the default port.
  int32 port = 1;

  // Additional postgres command line arguments.
  repeated string extra_args = 2;
}

// StartAsStandbyResult describes the outcome of a StartAsStandby call.
enum StartAsStandbyResult {
  START_AS_STANDBY_RESULT_UNSPECIFIED = 0;

  // PostgreSQL was started successfully in standby mode. Crash recovery may
  // have been performed automatically if the data directory was not cleanly stopped.
  START_AS_STANDBY_RESULT_STARTED = 1;

  // PostgreSQL was already running (no action taken).
  START_AS_STANDBY_RESULT_ALREADY_RUNNING = 2;
}

message StartAsStandbyResponse {
  // Outcome of the start attempt.
  StartAsStandbyResult result = 1;

  // Process ID of the running PostgreSQL server.
  int32 pid = 2;
}

// Stop PostgreSQL server
message StopRequest {
  // Shutdown mode: smart, fast, immediate
  string mode = 1;

  // Timeout
  google.protobuf.Duration timeout = 2;
}

message StopResponse {
  // Status message
  string message = 1;
}

// Restart PostgreSQL server
message RestartRequest {
  // Shutdown mode for stop phase: smart, fast, immediate
  string mode = 1;

  // Timeout for stop phase
  google.protobuf.Duration timeout = 2;

  // Override default port for start phase
  int32 port = 3;

  repeated string extra_args = 4;
}

message RestartResponse {
  // Process ID of restarted PostgreSQL server
  int32 pid = 1;

  // Status message
  string message = 2;
}

// Reload PostgreSQL configuration
message ReloadConfigRequest {
}

message ReloadConfigResponse {
  // Status message
  string message = 1;
}

// Get PostgreSQL server status
message StatusRequest {
}

message StatusResponse {
  // Server status
  ServerStatus status = 1;

  // Process ID (if running)
  int32 pid = 2;

  // Server version (if available)
  string version = 3;

  // Uptime (if running)
  google.protobuf.Duration uptime = 4;

  // Data directory path
  string data_dir = 5;

  // Port number
  int32 port = 6;

  // Host address
  string host = 7;

  // Is server ready to accept connections
  bool ready = 8;

  // Additional status information
  string message = 9;

  // pgBackRest TLS server status
  PgBackRestStatus pgbackrest_status = 10;
}

// pgBackRest TLS server status
message PgBackRestStatus {
  // Whether pgBackRest TLS server is currently running
  bool running = 1;

  // Error message if startup failed or last crash reason
  string error_message = 2;

  // Number of times pgBackRest has been restarted due to crashes
  int32 restart_count = 3;

  // Last successful startup timestamp
  google.protobuf.Timestamp last_started = 4;
}

// Server status enumeration
enum ServerStatus {
  UNKNOWN = 0;
  STOPPED = 1;
  STARTING = 2;
  RUNNING = 3;
  STOPPING = 4;
  NOT_INITIALIZED = 5;
}

// Get server version information
message VersionRequest {
  // Override default connection parameters
  string host = 1;
  int32 port = 2;
  string database = 3;
  string user = 4;
}

message VersionResponse {
  // PostgreSQL version string
  string version = 1;

  // Status message
  string message = 2;
}

// Initialize data directory
message InitDataDirRequest {
  // Authentication method for local connections
  string auth_local = 1;

  // Authentication method for host connections
  string auth_host = 2;

  // Additional initdb arguments
  repeated string extra_args = 3;
}

message InitDataDirResponse {
  // Status message
  string message = 1;
}

// PgRewind rewinds a PostgreSQL data directory to an earlier point in the timeline
message PgRewindRequest {
  // Source server hostname
  string source_host = 1;

  // Source server port
  int32 source_port = 2;

  // Perform a dry run without making changes (--dry-run)
  bool dry_run = 3;

  // Additional pg_rewind command line arguments
  repeated string extra_args = 4;

  // Application name for replication connection (used with -R flag)
  // This identifies the standby in pg_stat_replication and synchronous_standby_names
  string application_name = 5;
}

message PgRewindResponse {
  // Status message
  string message = 1;
  string output = 2;
}
