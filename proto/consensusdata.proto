syntax = "proto3";

package consensusdata;

import "clustermetadata.proto";

option go_package = "github.com/multigres/multigres/go/pb/consensusdata";

// CoordinatorProposal is a coordinator-assisted rule proposal. It either reflects
// a rule that's not yet in WAL that the coordinator wants to write, or it could
// reflect a rule discovered in WAL that hasn't been propagated to the point of
// becoming a decision.
message CoordinatorProposal {
  // The authority under which this proposal is made. Coordinators must revoke
  // previous agents before making a proposal.
  clustermetadata.TermRevocation term_revocation = 1;

  // The node that should become primary to facilitate this proposal.
  clustermetadata.PoolerAddress proposal_leader = 2;

  // The transition this proposal makes: decision is the full outgoing decision
  // this proposal supersedes. proposal is the full new rule being proposed: an
  // entirely new rule or an existing one that hasn't yet finished propagating to
  // durability.
  //
  // TODO: decision here doesn't always mean a confirmed decision — propagation
  // (see go/common/consensus/proposals.go's buildProposalCore) can legitimately
  // set it to a rule that was only ever an undecided proposal on the outgoing
  // side, trusted as the baseline being superseded. RulePosition{Decision,
  // Proposal} is otherwise used to mean "a pooler's own confirmed decision plus
  // any outstanding proposal beyond it" (PoolerPosition.position), a different
  // meaning that happens to share this shape. Introduce a dedicated message for
  // a coordinator's proposed transition instead of reusing RulePosition here.
  clustermetadata.RulePosition proposed_transition = 3;

  // When true, the leader must apply the incoming cohort GUC directly without
  // first satisfying the outgoing cohort quorum. Only valid for externally-
  // certified proposals (bootstrap, etc.).
  bool skip_outgoing_quorum = 4;
}

// RecruitRequest asks a pooler to revoke all terms below the one in the
// enclosed term_revocation and record the coordinator's exclusive right to
// propose at this term.
message RecruitRequest {
  // The revocation to accept. The pooler persists this to disk and responds
  // with its current ConsensusStatus (which includes the updated revocation).
  clustermetadata.TermRevocation term_revocation = 1;
}

// RecruitResponse carries the pooler's authoritative state after processing
// a RecruitRequest. The coordinator uses current_position to select the best
// promotion candidate.
message RecruitResponse {
  clustermetadata.ConsensusStatus consensus_status = 1;

  // Flushed and applied WAL position at the same instant this pooler
  // accepted the revocation, for the coordinator to use as diagnostic
  // context (e.g. detecting a stuck-replay bug) — not a consensus-algorithm
  // input; see PoolerLsn's proto doc.
  clustermetadata.PoolerLsn lsn = 2;
}

// PromoteRequest carries the coordinator's complete proposal for a new shard
// state. Every cohort member receives this: the designated leader promotes
// itself; all others configure replication toward the new primary.
message PromoteRequest {
  CoordinatorProposal proposal = 1;

  // Human-readable reason for this proposal (e.g. "dead_primary", "bootstrap").
  string reason = 2;

  // IDs of cohort members that accepted the term revocation during recruitment.
  // Used to record which nodes acknowledged the proposal in the rule history.
  repeated clustermetadata.ID accepted_node_ids = 3;
}

// PromoteResponse carries the pooler's state after applying a PromoteRequest.
message PromoteResponse {
  clustermetadata.ConsensusStatus consensus_status = 1;
}

// SetPrimaryRequest tells a pooler about the current leader and the rule
// the caller knows the cluster is at. The pooler compares the supplied rule
// against its own; if the supplied rule is strictly higher it applies the
// change (standby: update primary_conninfo; stale primary: demote), otherwise
// it returns success without changes. Idempotent under retries and safe
// against out-of-order delivery from stale recovery rounds.
//
// The pooler also validates that leader.id matches rule.leader_id — the
// rule's identity is authoritative; the leader field is just the contact
// information needed to act on that identity.
message SetPrimaryRequest {
  // The (position, primary, rewind_ready) the follower should adopt. Contact
  // info for the leader is replication_primary.primary (host + postgres_port
  // used to rewrite primary_conninfo); the position is
  // replication_primary.position, which the pooler compares against its own
  // observed position and only applies when strictly higher. primary.id must
  // match the position's leader_id. replication_primary.rewind_ready relays
  // whether the leader has checkpointed onto its current timeline: a
  // diverged follower defers its pg_rewind until it is true, but sets up
  // primary_conninfo and attempts to stream regardless.
  clustermetadata.ReplicationPrimary replication_primary = 3;
}

// SetPrimaryResponse carries the pooler's state after processing a
// SetPrimaryRequest.
message SetPrimaryResponse {
  clustermetadata.ConsensusStatus consensus_status = 1;
}
