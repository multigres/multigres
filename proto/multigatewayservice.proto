// This file contains the RPC service definition for multigateway.

syntax = "proto3";

package multigatewayservice;

option go_package = "github.com/multigres/multigres/go/pb/multigatewayservice";

// MultiGatewayService provides cross-gateway communication for query cancellation.
service MultiGatewayService {
  // CancelQuery forwards a cancel request to the gateway that owns the connection.
  rpc CancelQuery(CancelQueryRequest) returns (CancelQueryResponse);
}

// CancelQueryRequest contains the cancel key data from the PostgreSQL cancel request.
message CancelQueryRequest {
  // process_id is the PID sent by the client, encoding gateway prefix + local conn ID.
  uint32 process_id = 1;
  // secret_key is the backend key data for cancel request authentication.
  // Required: the receiving gateway verifies this matches before canceling.
  // Without it, any client that can guess a PID could cancel arbitrary queries.
  uint32 secret_key = 2;
  // replica indicates the cancel targets a connection on the replica-reads listener.
  // When false (default), the cancel targets the primary listener. This is needed
  // because both listeners share the same PID prefix and may have overlapping local
  // connection IDs — the connection type disambiguates which listener owns the PID.
  bool replica = 3;
}

// CancelQueryResponse is empty on success.
message CancelQueryResponse {
}
