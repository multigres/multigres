syntax = "proto3";

package multiorchdata;

import "clustermetadata.proto";
import "google/protobuf/timestamp.proto";
import "multipoolermanagerdata.proto";

option go_package = "github.com/multigres/multigres/go/pb/multiorchdata";

// PoolerHealthState represents the runtime state of a MultiPooler instance.
// This is the in-memory representation used by multiorch to track pooler health.
//
// It contains:
// - Core pooler metadata (embedded MultiPooler from topology)
// - Timestamps for staleness detection
// - Full health status from the Status RPC (embedded as multipoolermanagerdata.Status)
// - Computed fields for quick access
message PoolerHealthState {
  // Core pooler metadata from topology.
  // This contains: id, database, table_group, shard, key_range, type,
  // serving_status, hostname, port_map.
  clustermetadata.MultiPooler multi_pooler = 1;

  // Computed fields (cached by multiorch)
  bool is_last_check_valid = 3;

  // Timestamps for staleness detection
  google.protobuf.Timestamp last_check_attempted = 4;
  google.protobuf.Timestamp last_check_successful = 5;
  google.protobuf.Timestamp last_seen = 6;

  // Consensus status from ConsensusStatus RPC (for divergence detection)
  clustermetadata.ConsensusStatus consensus_status = 14;

  // Timestamp of the last time PostgreSQL specifically responded as healthy
  // (i.e. pg_isready passed). Never cleared on failure — callers must compare
  // against time.Now() to detect staleness.
  google.protobuf.Timestamp last_postgres_ready_time = 16;

  // Availability status from the most recent StatusResponse. Non-nil only for
  // nodes that are or have been primary. Used by PrimaryNeedsReplacement to
  // detect voluntary demotions (REQUESTING_DEMOTION) without a separate RPC.
  clustermetadata.AvailabilityStatus availability_status = 17;

  // Stream health fields (populated when multiorch uses ManagerHealthStream).

  // Whether a ManagerHealthStream stream is currently active for this pooler.
  bool stream_connected = 20;

  // The time at which the current stream was established.
  google.protobuf.Timestamp stream_connected_since = 21;

  // Full health status from the most recent successful Status RPC or
  // ManagerHealthStream snapshot. Nil until the first successful check.
  multipoolermanagerdata.Status status = 22;

  // Monotonic counter of health snapshots received on the current or past streams.
  int64 stream_snapshots_received = 23;

  // When the pooler reported it captured the most recent snapshot, on the
  // pooler's own clock (copied verbatim from ManagerHealthSnapshot.captured_at).
  // Distinct from last_seen/last_check_successful, which are stamped with the
  // orchestrator's clock on receipt. Comparing this against an orchestrator
  // timestamp must account for clock skew between the hosts.
  google.protobuf.Timestamp pooler_captured_at = 24;
}
