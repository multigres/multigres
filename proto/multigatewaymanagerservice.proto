// Management / introspection RPCs on the multigateway. These are intended for
// multiadmin to drive per-gateway debug pages — the gateway-to-gateway query
// cancellation API lives separately on MultiGatewayService.

syntax = "proto3";

package multigatewaymanager;

import "multigatewaymanagerdata.proto";

option go_package = "github.com/multigres/multigres/go/pb/multigatewaymanager";

// MultiGatewayManager exposes diagnostic snapshots of in-process state on a
// single multigateway instance.
service MultiGatewayManager {
  // GetQueryRegistry returns the per-fingerprint query registry snapshot,
  // including rolling trend samples for sparkline rendering.
  rpc GetQueryRegistry(GetQueryRegistryRequest)
      returns (GetQueryRegistryResponse);

  // GetConsolidatorStats returns a snapshot of the prepared-statement
  // consolidator.
  rpc GetConsolidatorStats(GetConsolidatorStatsRequest)
      returns (GetConsolidatorStatsResponse);
}

// GetQueryRegistryRequest is empty — the registry is per-instance.
message GetQueryRegistryRequest {
}

// GetQueryRegistryResponse wraps the registry snapshot.
message GetQueryRegistryResponse {
  multigatewaymanagerdata.QueryRegistrySnapshot snapshot = 1;
}

// GetConsolidatorStatsRequest is empty — the consolidator is per-instance.
message GetConsolidatorStatsRequest {
}

// GetConsolidatorStatsResponse wraps the consolidator stats.
message GetConsolidatorStatsResponse {
  multigatewaymanagerdata.ConsolidatorStats stats = 1;
}
