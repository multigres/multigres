syntax = "proto3";

package multipoolermanager;

import "multipoolermanagerdata.proto";

option go_package = "github.com/multigres/multigres/go/pb/multipoolermanager";

// MultiPoolerManager provides management APIs for PostgreSQL connection poolers
service MultiPoolerManager {
  //
  // PG Replication API wrappers.
  //

  // WaitForLSN waits for PostgreSQL server to reach a specific LSN position
  rpc WaitForLSN(multipoolermanagerdata.WaitForLSNRequest) returns (multipoolermanagerdata.WaitForLSNResponse);


  // StartReplication starts WAL replay on standby (calls pg_wal_replay_resume)
  rpc StartReplication(multipoolermanagerdata.StartReplicationRequest)
    returns (multipoolermanagerdata.StartReplicationResponse);

  // StopReplication stops WAL replay on standby (calls pg_wal_replay_pause)
  rpc StopReplication(multipoolermanagerdata.StopReplicationRequest)
    returns (multipoolermanagerdata.StopReplicationResponse);

  // Status gets unified status that works for both PRIMARY and REPLICA poolers
  // The multipooler returns information based on what type it believes itself to be,
  // avoiding disparity between what MultiOrch thinks versus actual state
  rpc Status(multipoolermanagerdata.StatusRequest)
    returns (multipoolermanagerdata.StatusResponse);

  //
  // Pooler Lifecycle
  //

  // Drain initiates voluntary draining of the pooler. The pooler stops
  // accepting new client-query RPCs, finishes in-flight queries (up to
  // drain_timeout), and — if currently primary — restarts as standby and
  // signals resignation to multiorch (same path as EmergencyDemote).
  //
  // Idempotent: calling Drain on an already-draining node returns the
  // current drain state. Calling with permanent=true upgrades a
  // non-permanent drain to permanent.
  rpc Drain(multipoolermanagerdata.DrainRequest)
    returns (multipoolermanagerdata.DrainResponse);

  //
  // Backup and Restore
  // All of these RPCs perform backups and restores in the context
  // of the database, table group and shard this multipooler serves.
  //

  // Backup performs a backup
  rpc Backup(multipoolermanagerdata.BackupRequest)
    returns (multipoolermanagerdata.BackupResponse);

  // RestoreFromBackup restores from a backup
  rpc RestoreFromBackup(multipoolermanagerdata.RestoreFromBackupRequest)
    returns (multipoolermanagerdata.RestoreFromBackupResponse);

  // GetBackups retrieves backup information
  rpc GetBackups(multipoolermanagerdata.GetBackupsRequest)
    returns (multipoolermanagerdata.GetBackupsResponse);

  // GetBackupByJobId queries a backup by its job_id annotation.
  // Returns the backup metadata if found, or nil backup if not.
  rpc GetBackupByJobId(multipoolermanagerdata.GetBackupByJobIdRequest)
      returns (multipoolermanagerdata.GetBackupByJobIdResponse);

  // ExpireBackups removes backups that exceed the configured retention policy.
  rpc ExpireBackups(multipoolermanagerdata.ExpireBackupsRequest)
    returns (multipoolermanagerdata.ExpireBackupsResponse);


  //
  // PostgreSQL Monitoring Control
  //

  // SetPostgresRestartsEnabled enables or disables automatic PostgreSQL restarts.
  // When disabled, the monitor continues to run but will not auto-restart a stopped
  // PostgreSQL instance. Used by tests and demos to prevent premature restarts during
  // controlled failovers.
  rpc SetPostgresRestartsEnabled(multipoolermanagerdata.SetPostgresRestartsEnabledRequest)
      returns (multipoolermanagerdata.SetPostgresRestartsEnabledResponse);

  // ManagerHealthStream is a bidirectional health stream between orchestrator
  // and pooler.
  //
  // The orchestrator sends a start message (ManagerHealthStreamClientMessage
  // with the start field set) to open the stream, then may send poll requests
  // at any time to trigger an immediate snapshot.
  //
  // The pooler sends a full health snapshot on connection, on every state
  // change, in response to poll requests, and periodically as a heartbeat.
  // Every message is a complete snapshot — there are no incremental updates.
  //
  // The orchestrator MUST implement a staleness timeout. The recommended
  // timeout is provided in the timeout field of each snapshot. If no message is
  // received within this timeout, the pooler should be marked unhealthy.
  rpc ManagerHealthStream(stream multipoolermanagerdata.ManagerHealthStreamClientMessage)
      returns (stream multipoolermanagerdata.ManagerHealthStreamResponse);
}
