ignore:
  - "go/pb/**"
  - "go/common/parser/goyacc/**"
  # goyacc-generated parser for the replication-protocol grammar. Most of
  # the file is the LALR state machine, which is exercised by parser tests
  # in aggregate but not line-by-line. The grammar source (grammar.y) is
  # the authoritative input; the .go file is pure output.
  - "go/common/parser/replparser/grammar.go"
  - "go/tools/asthelpergen/**"
  - "go/tools/flakyaggregator/**"
  - "go/tools/ruleguard/**"
  # PostgreSQL regression / isolation harness lives behind opt-in env
  # gates (RUN_PGREGRESS, RUN_PGISOLATION, RUN_EXTENDED_QUERY_SERVING_TESTS),
  # so coverage-collecting CI never executes any of it — every new line
  # would otherwise show as missing patch coverage. The suite itself is
  # exercised by the dedicated extended-suite workflow.
  - "go/test/endtoend/pgregresstest/**"
  # pgproto wire-protocol conformance suite — same story: gated behind
  # RUN_EXTENDED_QUERY_SERVING_TESTS and run by the dedicated test-pgproto
  # workflow, never by the coverage-collecting CI.
  - "go/test/endtoend/queryserving/pgproto/**"
