ignore:
  - "go/pb/**"
  - "go/common/parser/goyacc/**"
  - "go/tools/asthelpergen/**"
  - "go/tools/flakyaggregator/**"
  - "go/tools/ruleguard/**"
  # Build-time metric-catalog generator and its generated output. The tool
  # runs from `make metrics`, not the coverage-collecting test CI, and the
  # catalog is pure generated data — same treatment as asthelpergen above.
  - "go/tools/metricsgen/**"
  - "go/observability/metriccatalog/catalog_generated.go"
  # PostgreSQL regression / isolation harness lives behind opt-in env
  # gates (RUN_PGREGRESS, RUN_PGISOLATION, RUN_EXTENDED_QUERY_SERVING_TESTS),
  # so coverage-collecting CI never executes any of it — every new line
  # would otherwise show as missing patch coverage. The suite itself is
  # exercised by the dedicated extended-suite workflow.
  - "go/test/endtoend/pgregresstest/**"
  # pgproto wire-protocol conformance suite — same story: gated behind
  # RUN_EXTENDED_QUERY_SERVING_TESTS and run by the dedicated test-pgproto
  # workflow, never by the coverage-collecting CI.
  - "go/test/endtoend/queryserving/pgproto/**"
  # sqllogictest differential suite — same story: gated behind
  # RUN_EXTENDED_QUERY_SERVING_TESTS and run by the dedicated sqllogictest
  # workflow, never by the coverage-collecting CI.
  - "go/test/endtoend/queryserving/sqllogictest/**"
  # Shared harness helpers (patch verify/generate, corpus discovery, the
  # differential report core, schema-reset and run-loop scaffolding). The
  # pure-logic subset has unit tests, but the bulk only runs from the gated
  # extended suites above, so the cluster-driven lines would otherwise show
  # as missing patch coverage.
  - "go/test/endtoend/pgbuilder/**"
  - "go/test/endtoend/suiteutil/**"
  # Row-path micro-benchmarks and the pgbench / large-result benchmark harness
  # are gated behind RUN_BENCHMARKS and run by the dedicated benchmark workflow,
  # not the coverage-collecting CI, so their non-test lines (harness helpers)
  # would otherwise show as missing patch coverage.
  - "go/test/endtoend/queryserving/benchmarking/**"
  - "go/test/microbench/**"
